services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/iotdb
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-default}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    depends_on:
      - mongo

  udp-server:
    build: ./udp-server
    restart: unless-stopped
    ports:
      - "5003:5003/udp"
    environment:
      - PORT=5003
      - WEBHOOK_URL=http://server:3000/api/message/create
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-default}
    depends_on:
      - server

  client:
    build:
      context: ./client
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:3000/api}
        - REACT_APP_SERVER_URL=${REACT_APP_SERVER_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo-data:
